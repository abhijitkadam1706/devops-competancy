# =====================================================================
# ArgoCD Application — Staging
# Watches: gitops/staging/ in the mern-auth-gitops repo
# Deploys to: mern-auth-staging namespace
# Sync: Automatic (Jenkins updates tag → ArgoCD auto-deploys)
# =====================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mern-auth-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: mern-auth
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Data-Oceano-Infrastructure/mern-auth-gitops.git
    targetRevision: main
    path: staging

  destination:
    server: https://kubernetes.default.svc
    namespace: mern-auth-staging

  syncPolicy:
    automated:
      prune: true      # Delete resources removed from Git
      selfHeal: true   # Revert manual cluster changes
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
# =====================================================================
# ArgoCD Application — Production
# Watches: gitops/production/ in the mern-auth-gitops repo
# Deploys to: mern-auth-production namespace
# Sync: MANUAL (requires PR merge + manual sync click in ArgoCD UI)
# =====================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mern-auth-production
  namespace: argocd
  labels:
    app.kubernetes.io/name: mern-auth
    environment: production
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Data-Oceano-Infrastructure/mern-auth-gitops.git
    targetRevision: main
    path: production

  destination:
    server: https://kubernetes.default.svc
    namespace: mern-auth-production

  syncPolicy:
    # INTENTIONALLY NOT AUTOMATED for production safety
    # Requires: PR merge → ArgoCD UI "Sync" button click
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
