version: "2.0"

server:
  port: 8000

sonarqube:
  # URL must match SONAR_URL in Jenkinsfile
  serverUrl: http://sonarqube:9000

jenkins:
  systemMessage: |
    =======================================================
    Jenkins CI/CD — mern-auth  |  PRCICD-001 / PRCICD-002
    Master-Slave Architecture  |  K8s Agents  |  Prometheus
    =======================================================

  # ---- Global tool versions ----
  tool:
    nodejs:
      installations:
        - name:    NodeJS-20
          version: "20.12.2"
    sonarRunner:
      installations:
        - name: SonarQube-Scanner-5
          properties:
            - key:   sonar.host.url
              value: http://sonarqube:9000

  # ---- Credentials (base templates — values injected at deploy time) ----
  credentials:
    system:
      domainCredentials:
        - credentials:
            - usernamePassword:
                id:          registry-creds
                username:    registry-user
                password:    "${REGISTRY_PASSWORD}"
                description: Container registry credentials
            - string:
                id:    sonar-token
                secret: "${SONAR_TOKEN}"

  # ---- SonarQube integration ----
  sonarqube:
    installations:
      - name:              SonarQube
        serverUrl:         http://sonarqube:9000
        credentialsId:     sonar-token
        webhookSecretId:   ""

  # ---- Slack integration ----
  slackNotifier:
    teamDomain:      your-workspace
    tokenCredentialId: slack-token
    botUser:         true

  # ---- Kubernetes Cloud (Master → Slave provisioning) ----
  clouds:
    - kubernetes:
        name:              kubernetes
        serverUrl:         https://kubernetes.default.svc
        namespace:         cicd
        jenkinsUrl:        http://jenkins-master-svc:8080
        jenkinsTunnel:     jenkins-master-svc:50000
        containerCap:      20
        connectTimeout:    5
        readTimeout:       15
        maxRequestsPerHost: 64

        templates:
          # ---- Build Agent ----
          - name:            build-agent
            label:           build-agent
            namespace:       cicd
            nodeUsageMode:   EXCLUSIVE
            idleMinutes:     0         # Terminate immediately when idle
            containers:
              - name:        jnlp
                image:       jenkins/inbound-agent:3206.vb_15dcf73f6a_9-1
                alwaysPullImage: true
                resourceRequestCpu:    200m
                resourceRequestMemory: 256Mi
                resourceLimitCpu:    500m
                resourceLimitMemory: 512Mi
              - name:  node
                image: node:20-alpine
                command: cat
                ttyEnabled: true
                resourceRequestCpu:    500m
                resourceRequestMemory: 512Mi
                resourceLimitCpu:    "2"
                resourceLimitMemory: 2Gi
              - name:  docker
                image: docker:24-dind
                privileged: true
                resourceRequestCpu:    500m
                resourceRequestMemory: 512Mi
              - name:  trivy
                image: aquasec/trivy:0.51.4
                command: cat
                ttyEnabled: true
                resourceRequestCpu:    200m
                resourceRequestMemory: 256Mi
              - name:  sonar-scanner
                image: sonarsource/sonar-scanner-cli:5
                command: cat
                ttyEnabled: true
                resourceRequestCpu:    200m
                resourceRequestMemory: 256Mi

          # ---- Test Agent ----
          - name:            test-agent
            label:           test-agent
            namespace:       cicd
            nodeUsageMode:   EXCLUSIVE
            idleMinutes:     0
            containers:
              - name:  jnlp
                image: jenkins/inbound-agent:3206.vb_15dcf73f6a_9-1
                alwaysPullImage: true
                resourceRequestCpu:    200m
                resourceRequestMemory: 256Mi
              - name:  newman
                image: postman/newman:6-alpine
                command: cat
                ttyEnabled: true
                resourceRequestCpu:    200m
                resourceRequestMemory: 256Mi
              - name:  zap
                image: ghcr.io/zaproxy/zaproxy:stable
                command: cat
                ttyEnabled: true
                resourceRequestCpu:    500m
                resourceRequestMemory: 512Mi
              - name:  docker
                image: docker:24-dind
                privileged: true
                resourceRequestCpu:    500m
                resourceRequestMemory: 512Mi


  jobs:
    - script: |
        multibranchPipelineJob('mern-auth-cicd') {
          description('MERN Auth CI/CD — PRCICD-001 & PRCICD-002')
          branchSources {
            github {
              id('mern-auth-source')
              repoOwner('Data-Oceano-Infrastructure')
              repository('mern-auth')
              credentialsId('github-app-creds')
              traits {
                gitHubBranchDiscovery { strategyId(1) }  // PRs + main
                gitHubPullRequestDiscovery { strategyId(1) }
              }
            }
          }
          factory {
            workflowBranchProjectFactory {
              scriptPath('Jenkinsfile')
            }
          }
          triggers {
            periodic(5)  // Poll every 5 min as fallback
          }
          orphanedItemStrategy {
            discardOldItems { numToKeep(10) }
          }
        }
