# =============================================================================
# Jenkins Configuration as Code (JCasC)
#
# This file is the SINGLE SOURCE OF TRUTH for Jenkins configuration.
# All environment-specific values (ECR URLs, SonarQube project, GitOps repo)
# are injected at bootstrap time from AWS SSM via the Jenkins startup script.
#
# HOW IT WORKS:
#   1. Terraform writes ECR URLs, region etc. to SSM Parameter Store
#   2. Jenkins master user_data reads those SSM values at boot
#   3. Jenkins master writes them as OS environment variables
#   4. JCasC reads the OS env vars via ${VAR_NAME} syntax below
#   5. Jenkinsfile reads them via Jenkins Global Env (no hardcoding needed)
#
# TO RELOAD:  Manage Jenkins → Reload Configuration from Disk
#             OR: POST /reload-configuration-as-code/ with admin token
# =============================================================================

jenkins:
  systemMessage: "mern-auth Enterprise CI — Managed by JCasC. Do not edit manually."
  numExecutors: 0    # Master runs no jobs — builds happen on agents only

  # ── Security ────────────────────────────────────────────────────────────────
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id:       "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"   # Read from SSM at boot

  authorizationStrategy:
    roleBased:
      roles:
        global:
          - name: "admin"
            description: "Administrators"
            permissions:
              - "Overall/Administer"
            entries:
              - user: "admin"
          - name: "readonly"
            description: "Read-only access for auditors"
            permissions:
              - "Overall/Read"
              - "Job/Read"
              - "View/Read"

  # ── Global Environment Variables ─────────────────────────────────────────────
  # All values read from OS environment (set by user_data from SSM).
  # Nothing hardcoded here — change values by updating SSM parameters.
  globalNodeProperties:
    - envVars:
        env:
          - key:   "AWS_REGION"
            value: "${AWS_REGION}"
          - key:   "ECR_REGISTRY"
            value: "${ECR_REGISTRY}"
          - key:   "STAGE_REGISTRY"
            value: "${ECR_STAGE_REPO}"
          - key:   "PROD_REGISTRY"
            value: "${ECR_PROD_REPO}"
          - key:   "SONAR_PROJECT"
            value: "${SONAR_PROJECT}"
          - key:   "SONAR_ORG"
            value: "${SONAR_ORG}"
          - key:   "GITOPS_REPO"
            value: "${GITOPS_REPO}"

  # ── Pipeline Options ─────────────────────────────────────────────────────────
  views:
    - all:
        name: "all"

# ── Credentials ──────────────────────────────────────────────────────────────
# All secrets are injected from SSM at JCasC load time.
# Jenkins never stores plaintext — values come from ${} OS env vars.
credentials:
  system:
    domainCredentials:
      - credentials:
          # ── SSH key for master → agent connections ────────────────────────────
          # Uses fileOnMaster to avoid multiline PEM env var issues in sysconfig.
          # File is written to disk by the EC2 user_data bootstrap script.
          - basicSSHUserPrivateKey:
              scope:       GLOBAL
              id:          "jenkins-ssh-agent-key"
              description: "SSH key for Jenkins master → agent node connections"
              username:    "jenkins-agent"
              privateKeySource:
                fileOnMaster:
                  privateKeyFile: "/var/lib/jenkins/.ssh/agent_key"

          - string:
              scope:       GLOBAL
              id:          "sonarqube-token"
              description: "SonarCloud API token"
              secret:      "${SONARCLOUD_TOKEN}"

          - usernamePassword:
              scope:       GLOBAL
              id:          "gitops-repo-creds"
              description: "GitHub PAT for GitOps repo commits"
              username:    "${GITHUB_USERNAME}"
              password:    "${GITHUB_PAT}"

          - string:
              scope:       GLOBAL
              id:          "test-jwt-secret"
              description: "JWT secret for integration test containers"
              secret:      "${TEST_JWT_SECRET}"

          - string:
              scope:       GLOBAL
              id:          "test-mongo-password"
              description: "MongoDB password for integration test containers"
              secret:      "${TEST_MONGO_PASS}"

          # cosign-private-key PEM is written to /var/lib/jenkins/cosign-private-key.pem
          # at EC2 boot by user_data. Jenkinsfile references the file path directly.
          # Only the password (single-line string) is stored as a credential here.
          - string:
              scope:       GLOBAL
              id:          "cosign-key-password"
              description: "Password protecting the Cosign private key"
              secret:      "${COSIGN_KEY_PASSWORD}"

# ── SonarQube Server ──────────────────────────────────────────────────────────
unclassified:
  sonarGlobalConfiguration:
    buildWrapperEnabled: false
    installations:
      - name:             "SonarQube"
        serverUrl:        "https://sonarcloud.io"
        credentialsId:    "sonarqube-token"
        mojoVersion:      ""

  # Git SCM
  scmGit:
    globalConfigName:  "Jenkins CI"
    globalConfigEmail: "jenkins@ci.internal"

  # Build discard — keep 20 builds, 30 days max
  buildDiscarders:
    configuredBuildDiscarders:
      - "jobBuildDiscarder"

# ── Agent Node Configuration (SSH-based) ──────────────────────────────────────
# Agent IPs are injected from SSM at master boot (Terraform writes them).
# The master reads all 3 agent IPs, sets them as OS env vars, JCasC picks them up.
nodes:
  - permanent:
      name:        "build-agent"
      description: "Node.js 20, sonar-scanner, kustomize — Stages 1, 2, 3, 7"
      numExecutors: 2
      remoteFS:    "/home/jenkins-agent/workspace"
      labelString: "build-agent"
      launcher:
        ssh:
          host:            "${BUILD_AGENT_HOST}"
          port:            22
          credentialsId:   "jenkins-ssh-agent-key"
          launchTimeoutSeconds: 60
          maxNumRetries:   3
          retryWaitTime:   30
          sshHostKeyVerificationStrategy:
            manuallyTrustedKeyVerificationStrategy:
              requireInitialManualTrust: false

  - permanent:
      name:        "security-agent"
      description: "Docker, Kaniko, Trivy, Cosign — Stage 4"
      numExecutors: 1
      remoteFS:    "/home/jenkins-agent/workspace"
      labelString: "security-agent"
      launcher:
        ssh:
          host:            "${SECURITY_AGENT_HOST}"
          port:            22
          credentialsId:   "jenkins-ssh-agent-key"
          launchTimeoutSeconds: 60
          maxNumRetries:   3
          retryWaitTime:   30
          sshHostKeyVerificationStrategy:
            manuallyTrustedKeyVerificationStrategy:
              requireInitialManualTrust: false

  - permanent:
      name:        "test-agent"
      description: "Docker (isolated network), Newman, OWASP ZAP — Stages 5, 6"
      numExecutors: 1
      remoteFS:    "/home/jenkins-agent/workspace"
      labelString: "test-agent"
      launcher:
        ssh:
          host:            "${TEST_AGENT_HOST}"
          port:            22
          credentialsId:   "jenkins-ssh-agent-key"
          launchTimeoutSeconds: 60
          maxNumRetries:   3
          retryWaitTime:   30
          sshHostKeyVerificationStrategy:
            manuallyTrustedKeyVerificationStrategy:
              requireInitialManualTrust: false
