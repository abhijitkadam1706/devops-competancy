---
# =============================================================================
# PROJECT      : mern-auth — Full-Stack Authentication Application
# FILE         : jenkins/jenkins-slaves.yaml
# DESCRIPTION  : Jenkins Slave (Agent) Pod Templates — Kubernetes
#                Defines FOUR dedicated agent types, each provisioned
#                on-demand by the Jenkins Master via the Kubernetes plugin.
#                Pods are ephemeral — spun up per job, terminated on completion.
#
# ARCHITECTURE : 1 Master + 4 Slaves
#   ┌─────────────────────────────────────────────────────────────┐
#   │  JENKINS MASTER (Orchestrator)                              │
#   │  - Receives GitHub webhook                                  │
#   │  - Schedules slaves on Kubernetes                           │
#   │  - Holds manual approval gate (Stage 9)                     │
#   │  - Never executes build/test work directly                  │
#   └─────────────────┬───────────────────────────────────────────┘
#                     │ Provisions on-demand via Kubernetes API
#       ┌─────────────┼──────────────┬──────────────────┐
#       ▼             ▼              ▼                   ▼
#   build-agent  security-agent  test-agent         deploy-agent
#   (Stage 1,2)  (Stage 3,4,5)  (Stage 6,7)        (Stage 8,10,11,12)
#
# AWS REGION   : ap-southeast-1 (Singapore)
# NAMESPACE    : cicd
# CONTROLS     : PRCICD-001 (Release Workflows) | PRCICD-002 (Build/Test)
# MANAGED BY   : DevOps Engineering Team
# VERSION      : 2.0.0
# LAST UPDATED : 2026-04-03
#
# USAGE: kubectl apply -f jenkins/jenkins-slaves.yaml
# =============================================================================

# =============================================================================
# SLAVE 1 OF 4 — build-agent
# =============================================================================
# STAGES   : Stage 1 (Checkout & npm ci) | Stage 2 (ESLint + SonarQube scan)
# CONTAINS : jnlp agent | node:18-alpine | sonar-scanner-cli
# PURPOSE  : Source code checkout, dependency installation, static analysis.
#            Light-weight agent — no Docker-in-Docker needed here.
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name:      build-agent-template
  namespace: cicd
  labels:
    # Enterprise resource labels
    jenkins/agent-type:           build
    app.kubernetes.io/component:  jenkins-slave
    app.kubernetes.io/part-of:    mern-auth-cicd
    app.kubernetes.io/managed-by: devops
    project:                      mern-auth
    slave-id:                     "slave-1-of-4"
  annotations:
    description: "Jenkins Slave 1/4 — Build Agent: npm ci, ESLint, SonarQube scanner"
    stages:      "Stage 1 (Checkout/Install) | Stage 2 (Lint/SAST)"
    owner:       "devops-team"
spec:
  restartPolicy: Never     # Ephemeral — never restart after job completes

  # Security: run as non-root to match container best practices
  securityContext:
    runAsNonRoot: false    # jnlp requires root briefly for workspace setup
    fsGroup: 1000

  containers:
    # ── JNLP — required by Jenkins Kubernetes plugin for master communication ──
    - name:  jnlp
      image: jenkins/inbound-agent:3206.vb_15dcf73f6a_9-1
      imagePullPolicy: Always
      resources:
        requests: { cpu: "200m", memory: "256Mi" }
        limits:   { cpu: "500m", memory: "512Mi" }

    # ── Node.js 18 — matches the Dockerfile base image exactly ───────────────
    - name:  node
      image: node:18-alpine    # PINNED to node:18 — same as production Dockerfile
      command: ["cat"]
      tty:     true
      resources:
        requests: { cpu: "500m", memory: "512Mi" }
        limits:   { cpu: "2",    memory: "2Gi"   }
      env:
        - name:  NODE_ENV
          value: test          # Prevents production-only code paths during build

    # ── SonarQube Scanner — SAST for Stage 2 ─────────────────────────────────
    - name:  sonar-scanner
      image: sonarsource/sonar-scanner-cli:5   # Pinned major version
      command: ["cat"]
      tty:     true
      resources:
        requests: { cpu: "300m", memory: "512Mi" }
        limits:   { cpu: "1",    memory: "2Gi"   }

---
# =============================================================================
# SLAVE 2 OF 4 — security-agent
# =============================================================================
# STAGES   : Stage 3 (Quality Gate + Coverage) | Stage 4 (Docker + Trivy)
#            Stage 5 (Push to ECR)
# CONTAINS : jnlp agent | node:18-alpine | docker:24-dind | trivy | python3
# PURPOSE  : Security scanning, CVE detection, SBOM generation, image push.
#            Requires Docker-in-Docker (privileged) for image build and push.
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name:      security-agent-template
  namespace: cicd
  labels:
    jenkins/agent-type:           security
    app.kubernetes.io/component:  jenkins-slave
    app.kubernetes.io/part-of:    mern-auth-cicd
    app.kubernetes.io/managed-by: devops
    project:                      mern-auth
    slave-id:                     "slave-2-of-4"
  annotations:
    description: "Jenkins Slave 2/4 — Security Agent: Quality Gate, Trivy CVE, SBOM, ECR push"
    stages:      "Stage 3 (Quality Gate) | Stage 4 (Docker Build/Trivy) | Stage 5 (ECR Push)"
    owner:       "devops-team"
    security-note: "Privileged required for Docker-in-Docker image build"
spec:
  restartPolicy: Never

  containers:
    # ── JNLP — master communication ──────────────────────────────────────────
    - name:  jnlp
      image: jenkins/inbound-agent:3206.vb_15dcf73f6a_9-1
      imagePullPolicy: Always
      resources:
        requests: { cpu: "200m", memory: "256Mi" }
        limits:   { cpu: "500m", memory: "512Mi" }

    # ── Node.js 18 — for Vitest coverage check in Stage 3 ───────────────────
    - name:  node
      image: node:18-alpine
      command: ["cat"]
      tty:     true
      resources:
        requests: { cpu: "300m", memory: "256Mi" }
        limits:   { cpu: "1",    memory: "1Gi"   }

    # ── Docker-in-Docker — required for docker build + docker push ───────────
    - name:  docker
      image: docker:24-dind       # Docker 24 — LTS stable version
      imagePullPolicy: Always
      securityContext:
        privileged: true          # REQUIRED for Docker-in-Docker
      env:
        - name:  DOCKER_TLS_CERTDIR
          value: ""               # Disable TLS for intra-pod DinD (safe inside K8s)
      resources:
        requests: { cpu: "500m", memory: "512Mi" }
        limits:   { cpu: "2",    memory: "2Gi"   }
      volumeMounts:
        - name:      docker-sock
          mountPath: /var/run/docker.sock

    # ── Trivy — CVE scanner + SBOM generator ─────────────────────────────────
    - name:  trivy
      image: aquasec/trivy:0.51.4    # Pinned version — reproducible security scans
      command: ["cat"]
      tty:     true
      resources:
        requests: { cpu: "300m", memory: "256Mi" }
        limits:   { cpu: "1",    memory: "1Gi"   }

    # ── Python3 — used by Jenkinsfile to parse Trivy JSON and coverage reports ──
    - name:  python
      image: python:3.11-alpine
      command: ["cat"]
      tty:     true
      resources:
        requests: { cpu: "100m", memory: "128Mi" }
        limits:   { cpu: "500m", memory: "512Mi" }

  volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock

---
# =============================================================================
# SLAVE 3 OF 4 — test-agent
# =============================================================================
# STAGES   : Stage 6 (Newman integration tests + OWASP ZAP DAST)
#            Stage 7 (DAST Quality Gate)
# CONTAINS : jnlp agent | newman | zaproxy | docker:24-dind
# PURPOSE  : API integration testing against a live app+db instance.
#            OWASP ZAP dynamic security scan.
#            Docker-in-Docker used to spin up ephemeral MongoDB + app.
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name:      test-agent-template
  namespace: cicd
  labels:
    jenkins/agent-type:           test
    app.kubernetes.io/component:  jenkins-slave
    app.kubernetes.io/part-of:    mern-auth-cicd
    app.kubernetes.io/managed-by: devops
    project:                      mern-auth
    slave-id:                     "slave-3-of-4"
  annotations:
    description: "Jenkins Slave 3/4 — Test Agent: Newman (Postman) integration tests + OWASP ZAP DAST"
    stages:      "Stage 6 (Integration+DAST) | Stage 7 (DAST Quality Gate)"
    owner:       "devops-team"
    security-note: "Privileged required for Docker-in-Docker — runs test MongoDB + app containers"
spec:
  restartPolicy: Never

  containers:
    # ── JNLP — master communication ──────────────────────────────────────────
    - name:  jnlp
      image: jenkins/inbound-agent:3206.vb_15dcf73f6a_9-1
      imagePullPolicy: Always
      resources:
        requests: { cpu: "200m", memory: "256Mi" }
        limits:   { cpu: "500m", memory: "512Mi" }

    # ── Newman — Postman CLI runner for 9 API integration tests ──────────────
    - name:  newman
      image: postman/newman:6-alpine    # Pinned major version
      command: ["cat"]
      tty:     true
      resources:
        requests: { cpu: "200m", memory: "256Mi" }
        limits:   { cpu: "1",    memory: "1Gi"   }

    # ── OWASP ZAP — Dynamic Application Security Testing (DAST) ─────────────
    - name:  zap
      image: ghcr.io/zaproxy/zaproxy:stable    # Official ZAP stable channel
      command: ["cat"]
      tty:     true
      resources:
        requests: { cpu: "500m", memory: "1Gi"  }
        limits:   { cpu: "2",    memory: "3Gi"  }    # ZAP is memory-intensive

    # ── Docker-in-Docker — spins up test MongoDB + mern-auth app containers ──
    - name:  docker
      image: docker:24-dind
      imagePullPolicy: Always
      securityContext:
        privileged: true
      env:
        - name:  DOCKER_TLS_CERTDIR
          value: ""
      resources:
        requests: { cpu: "500m", memory: "512Mi" }
        limits:   { cpu: "2",    memory: "2Gi"   }
      volumeMounts:
        - name:      docker-sock
          mountPath: /var/run/docker.sock

  volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock

---
# =============================================================================
# SLAVE 4 OF 4 — deploy-agent
# =============================================================================
# STAGES   : Stage 8  (Deploy to K8s Staging)
#            Stage 10 (Push prod image to ECR)
#            Stage 11 (Blue/Green production deploy)
#            Stage 12 (Prometheus monitor + auto-rollback)
# CONTAINS : jnlp agent | kubectl:1.29 | helm:3.14 | curl (Alpine)
# PURPOSE  : All Kubernetes deployment operations.
#            Blue/Green traffic switching via Service selector patch.
#            Prometheus polling for 5-minute health watch + auto-rollback.
#            Uses jenkins-master-sa ServiceAccount for cluster API access.
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name:      deploy-agent-template
  namespace: cicd
  labels:
    jenkins/agent-type:           deploy
    app.kubernetes.io/component:  jenkins-slave
    app.kubernetes.io/part-of:    mern-auth-cicd
    app.kubernetes.io/managed-by: devops
    project:                      mern-auth
    slave-id:                     "slave-4-of-4"
  annotations:
    description: "Jenkins Slave 4/4 — Deploy Agent: kubectl staging+prod, Blue/Green switch, Prometheus monitor"
    stages:      "Stage 8 (Staging) | Stage 10 (Prod Push) | Stage 11 (Blue/Green) | Stage 12 (Prometheus)"
    owner:       "devops-team"
spec:
  restartPolicy:      Never
  serviceAccountName: jenkins-master-sa    # RBAC: cluster-admin for kubectl operations

  containers:
    # ── JNLP — master communication ──────────────────────────────────────────
    - name:  jnlp
      image: jenkins/inbound-agent:3206.vb_15dcf73f6a_9-1
      imagePullPolicy: Always
      resources:
        requests: { cpu: "200m", memory: "256Mi" }
        limits:   { cpu: "500m", memory: "512Mi" }

    # ── kubectl — Kubernetes CLI, pinned to match EKS cluster version ─────────
    - name:  kubectl
      image: bitnami/kubectl:1.29    # PINNED to match EKS cluster K8s version 1.29
      command: ["sleep", "infinity"] # Keep container alive during all deploy stages
      resources:
        requests: { cpu: "200m", memory: "256Mi" }
        limits:   { cpu: "1",    memory: "1Gi"   }

    # ── Helm — Kubernetes package manager (v3.14 — latest stable) ────────────
    - name:  helm
      image: alpine/helm:3.14.4    # Pinned version — reproducible deployments
      command: ["cat"]
      tty:     true
      resources:
        requests: { cpu: "100m", memory: "128Mi" }
        limits:   { cpu: "500m", memory: "512Mi" }

    # ── curl + python3 in Alpine — for Prometheus API queries (Stage 12) ─────
    - name:  monitoring-tools
      image: alpine:3.19
      command: ["sh", "-c", "apk add --no-cache curl python3 && cat"]
      tty:     true
      resources:
        requests: { cpu: "100m", memory: "128Mi" }
        limits:   { cpu: "500m", memory: "512Mi" }
