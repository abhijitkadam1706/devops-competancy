# =============================================================================
# GitOps Base — Deployment
# Kustomize base: image tag is overridden by staging/production overlays.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-auth
  labels:
    app.kubernetes.io/name: mern-auth
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mern-auth
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # Zero-downtime rolling updates
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mern-auth
        app.kubernetes.io/component: api
      annotations:
        # Force pod restart when ConfigMap/Secret changes
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9191"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: mern-auth-app   # IRSA — grants Secrets Manager access

      # Prevent multiple pods landing on same node
      topologySpreadConstraints:
        - maxSkew:            1
          topologyKey:        kubernetes.io/hostname
          whenUnsatisfiable:  DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: mern-auth

      securityContext:
        runAsNonRoot:   true
        runAsUser:      1001
        fsGroup:        1001

      containers:
        - name: mern-auth
          # image is set by: kustomize edit set image
          image: mern-auth:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9191
              protocol: TCP

          env:
            - name:  PORT
              value: "9191"
            - name:  NODE_ENV
              value: "production"
            # MONGODB_URI injected from Kubernetes Secret (sourced from AWS Secrets Manager)
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mern-auth-docdb-secret
                  key:  MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mern-auth-app-secret
                  key:  JWT_SECRET

          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /api/user
              port: http
            initialDelaySeconds: 10
            periodSeconds:       10
            failureThreshold:    3

          livenessProbe:
            httpGet:
              path: /api/user
              port: http
            initialDelaySeconds: 30
            periodSeconds:       20
            failureThreshold:    3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name:      tmp-dir
              mountPath: /tmp

      volumes:
        - name: tmp-dir
          emptyDir: {}
