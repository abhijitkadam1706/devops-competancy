# =============================================================================
# GitOps Base — PodDisruptionBudget
# Ensures at least 1 pod is always available during node drains / rolling updates
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mern-auth
  labels:
    app.kubernetes.io/name:      mern-auth
    app.kubernetes.io/component: api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mern-auth
