# Production Service — traffic switch via slot selector
# To switch traffic: change selector.slot from "blue" to "green" via Git commit
apiVersion: v1
kind: Service
metadata:
  name: mern-auth-prod
  labels:
    app: mern-auth
spec:
  selector:
    app: mern-auth
    slot: blue  # Change to "green" to promote new release
  ports:
    - name: http
      port: 9191
      targetPort: 9191
  type: ClusterIP
