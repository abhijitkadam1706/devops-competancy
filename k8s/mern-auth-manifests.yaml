---
# =====================================================================
# mern-auth — Kubernetes Manifests
# Stack  : Node.js 18 + React/Vite | Port: 9191 | User: appuser (non-root)
# Environments: Staging | Production Blue/Green
# =====================================================================

# ── Namespaces ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: mern-auth-staging
  labels:
    environment: staging
    app.kubernetes.io/name: mern-auth
---
apiVersion: v1
kind: Namespace
metadata:
  name: mern-auth-production
  labels:
    environment: production
    app.kubernetes.io/name: mern-auth
---
apiVersion: v1
kind: Namespace
metadata:
  name: cicd
  labels:
    purpose: cicd
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    purpose: monitoring

# ── Secrets (base templates — values injected via Helm/SealedSecrets) ──
---
apiVersion: v1
kind: Secret
metadata:
  name: mern-auth-secrets
  namespace: mern-auth-staging
type: Opaque
stringData:
  mongodb-uri: "mongodb://root:CHANGE_ME@mongo-staging:27017/mern-auth?authSource=admin"
  jwt-secret:  "CHANGE_ME_STAGING_JWT_SECRET"
---
apiVersion: v1
kind: Secret
metadata:
  name: mern-auth-prod-secrets
  namespace: mern-auth-production
type: Opaque
stringData:
  mongodb-uri: "mongodb://root:CHANGE_ME@mongo-prod:27017/mern-auth?authSource=admin"
  jwt-secret:  "CHANGE_ME_PROD_JWT_SECRET"

# ======================================================================
# ── STAGING ────────────────────────────────────────────────────────────
# ======================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-auth
  namespace: mern-auth-staging
  labels:
    app:         mern-auth
    environment: staging
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app:         mern-auth
      environment: staging
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app:         mern-auth
        environment: staging
      annotations:
        # Prometheus auto-discovery
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9191"
        prometheus.io/path:   "/metrics"
    spec:
      # Match Dockerfile: non-root user 'appuser'
      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        fsGroup:      1001
      containers:
        - name:  mern-auth
          image: registry.internal/mern-auth-stage:latest  # updated by Jenkinsfile Stage 8
          ports:
            - name:          http
              containerPort: 9191     # real port from api/index.js line 45
              protocol:      TCP
          env:
            - name:  NODE_ENV
              value: staging
            - name:  PORT
              value: "9191"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mern-auth-secrets
                  key:  mongodb-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mern-auth-secrets
                  key:  jwt-secret
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"
          # Health probe — GET /api/user returns {message:'API is working!'}
          livenessProbe:
            httpGet:
              path: /api/user
              port: 9191
            initialDelaySeconds: 30
            periodSeconds:       10
            failureThreshold:    3
          readinessProbe:
            httpGet:
              path: /api/user
              port: 9191
            initialDelaySeconds: 15
            periodSeconds:       5
            failureThreshold:    3
---
apiVersion: v1
kind: Service
metadata:
  name: mern-auth
  namespace: mern-auth-staging
spec:
  selector:
    app:         mern-auth
    environment: staging
  ports:
    - name:       http
      port:       9191
      targetPort: 9191
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mern-auth-staging-ingress
  namespace: mern-auth-staging
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: mern-auth.staging.internal
      http:
        paths:
          - path:     /api
            pathType: Prefix
            backend:
              service:
                name: mern-auth
                port: { number: 9191 }
          - path:     /
            pathType: Prefix
            backend:
              service:
                name: mern-auth
                port: { number: 9191 }

# ======================================================================
# ── PRODUCTION — BLUE Deployment (current stable)
# ======================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-auth-blue
  namespace: mern-auth-production
  labels:
    app:  mern-auth
    slot: blue
spec:
  replicas: 3
  selector:
    matchLabels:
      app:  mern-auth
      slot: blue
  template:
    metadata:
      labels:
        app:         mern-auth
        slot:        blue
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9191"
        prometheus.io/path:   "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        fsGroup:      1001
      containers:
        - name:  mern-auth
          image: registry.internal/mern-auth-prod:stable
          ports:
            - containerPort: 9191
          env:
            - name:  NODE_ENV
              value: production
            - name:  PORT
              value: "9191"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mern-auth-prod-secrets
                  key:  mongodb-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mern-auth-prod-secrets
                  key:  jwt-secret
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi"   }
          livenessProbe:
            httpGet:  { path: /api/user, port: 9191 }
            initialDelaySeconds: 30
            periodSeconds:       10
          readinessProbe:
            httpGet:  { path: /api/user, port: 9191 }
            initialDelaySeconds: 15
            periodSeconds:       5

# ======================================================================
# ── PRODUCTION — GREEN Deployment (new release target)
# ======================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-auth-green
  namespace: mern-auth-production
  labels:
    app:  mern-auth
    slot: green
spec:
  replicas: 3
  selector:
    matchLabels:
      app:  mern-auth
      slot: green
  template:
    metadata:
      labels:
        app:         mern-auth
        slot:        green
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9191"
        prometheus.io/path:   "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        fsGroup:      1001
      containers:
        - name:  mern-auth
          image: registry.internal/mern-auth-prod:latest  # updated by Jenkinsfile Stage 11
          ports:
            - containerPort: 9191
          env:
            - name:  NODE_ENV
              value: production
            - name:  PORT
              value: "9191"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mern-auth-prod-secrets
                  key:  mongodb-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mern-auth-prod-secrets
                  key:  jwt-secret
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi"   }
          livenessProbe:
            httpGet:  { path: /api/user, port: 9191 }
            initialDelaySeconds: 30
            periodSeconds:       10
          readinessProbe:
            httpGet:  { path: /api/user, port: 9191 }
            initialDelaySeconds: 15
            periodSeconds:       5

# ── Production Service — traffic switch via slot selector patch ─────────
---
apiVersion: v1
kind: Service
metadata:
  name: mern-auth-prod
  namespace: mern-auth-production
  labels:
    app: mern-auth
spec:
  selector:
    app:  mern-auth
    slot: blue         # Jenkinsfile Stage 11 patches this to 'green' on release
  ports:
    - name:       http
      port:       9191
      targetPort: 9191
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mern-auth-prod-ingress
  namespace: mern-auth-production
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: mern-auth.internal
      http:
        paths:
          - path:     /api
            pathType: Prefix
            backend:
              service:
                name: mern-auth-prod
                port: { number: 9191 }
          - path:     /
            pathType: Prefix
            backend:
              service:
                name: mern-auth-prod
                port: { number: 9191 }

# ── MongoDB StatefulSet — Staging ───────────────────────────────────────
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-staging
  namespace: mern-auth-staging
spec:
  serviceName: mongo-staging
  replicas: 1
  selector:
    matchLabels:
      app: mongo-staging
  template:
    metadata:
      labels:
        app: mongo-staging
    spec:
      containers:
        - name:  mongo
          image: mongo:6.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: root
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mern-auth-secrets
                  key:  mongodb-uri
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          volumeMounts:
            - name:      mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-staging
  namespace: mern-auth-staging
spec:
  selector:
    app: mongo-staging
  ports:
    - port: 27017
  clusterIP: None   # headless — dns: mongo-staging.mern-auth-staging.svc.cluster.local
